<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Progressive Candidate Directory</title>
<style>
  :root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#238636;--accent2:#1f6feb;--tag:#21262d;--red:#da3633;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:20px 24px;display:flex;align-items:center;gap:16px;}
  .logo{width:32px;height:32px;background:#1f6feb;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:18px;}
  header h1{font-size:18px;font-weight:600;}
  header p{font-size:13px;color:var(--muted);margin-top:2px;}
  .controls{padding:20px 24px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--border);}
  input,select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:14px;}
  input{flex:1;min-width:200px;}
  input:focus,select:focus{outline:none;border-color:var(--accent2);}
  .count{color:var(--muted);font-size:13px;margin-left:auto;}
  .grid{padding:16px 24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;transition:border-color .15s;}
  .card:hover{border-color:var(--accent2);}
  .card-name{font-size:16px;font-weight:600;margin-bottom:4px;}
  .card-office{font-size:13px;color:var(--accent2);margin-bottom:8px;}
  .card-location{font-size:13px;color:var(--muted);margin-bottom:10px;}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
  .tag{font-size:11px;padding:2px 8px;border-radius:12px;background:var(--tag);border:1px solid var(--border);color:var(--muted);}
  .tag.dsa{border-color:#e05252;color:#e05252;}
  .tag.jr{border-color:#f0883e;color:#f0883e;}
  .tag.or{border-color:#3fb950;color:#3fb950;}
  .tag.sa{border-color:#a371f7;color:#a371f7;}
  .card-link{display:inline-block;font-size:12px;color:var(--accent2);text-decoration:none;}
  .card-link:hover{text-decoration:underline;}
  .empty{grid-column:1/-1;text-align:center;padding:60px;color:var(--muted);}
  .add-btn{background:var(--accent);color:#fff;border:none;padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:500;}
  .add-btn:hover{background:#2ea043;}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;width:90%;max-width:480px;}
  .modal h2{font-size:16px;margin-bottom:16px;}
  .form-field{margin-bottom:12px;}
  .form-field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;}
  .form-field input,.form-field select{width:100%;}
  .form-row{display:flex;gap:8px;}
  .form-row .form-field{flex:1;}
  .modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
  .btn-cancel{background:transparent;color:var(--muted);border:1px solid var(--border);padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;}
  .btn-save{background:var(--accent);color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;}
  .updated{font-size:11px;color:var(--muted);margin-top:8px;}
</style>
</head>
<body>

<header>
  <div class="logo">✊</div>
  <div>
    <h1>Progressive Candidate Directory</h1>
    <p>Democratic socialists & progressive Democrats running for office across the US</p>
  </div>
  <button class="add-btn" onclick="openModal()" style="margin-left:auto">+ Add Candidate</button>
</header>

<div class="controls">
  <input type="text" id="search" placeholder="Search by name, city, county…" oninput="render()">
  <select id="stateFilter" onchange="render()">
    <option value="">All States</option>
  </select>
  <select id="officeFilter" onchange="render()">
    <option value="">All Offices</option>
  </select>
  <select id="endorseFilter" onchange="render()">
    <option value="">All Endorsements</option>
    <option value="DSA">DSA</option>
    <option value="Justice Democrats">Justice Democrats</option>
    <option value="Our Revolution">Our Revolution</option>
    <option value="Socialist Alternative">Socialist Alternative</option>
  </select>
  <span class="count" id="count"></span>
</div>

<div class="grid" id="grid"></div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Add Candidate</h2>
    <div class="form-field"><label>Full Name *</label><input id="f-name" placeholder="Jane Smith"></div>
    <div class="form-field"><label>Office Sought *</label><input id="f-office" placeholder="U.S. Representative, State Senator, Mayor…"></div>
    <div class="form-row">
      <div class="form-field"><label>City</label><input id="f-city" placeholder="Chicago"></div>
      <div class="form-field"><label>County</label><input id="f-county" placeholder="Cook"></div>
    </div>
    <div class="form-row">
      <div class="form-field"><label>State (2-letter) *</label><input id="f-state" placeholder="IL" maxlength="2" style="text-transform:uppercase"></div>
      <div class="form-field"><label>Endorsements (comma separated)</label><input id="f-endorse" placeholder="DSA, Our Revolution"></div>
    </div>
    <div class="form-field"><label>Campaign Website</label><input id="f-site" placeholder="https://…"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveCandidate()">Add to Directory</button>
    </div>
  </div>
</div>

<script>
let candidates = [];

const tagClass = e => {
  if(e==='DSA') return 'dsa';
  if(e==='Justice Democrats') return 'jr';
  if(e==='Our Revolution') return 'or';
  if(e==='Socialist Alternative') return 'sa';
  return '';
};

function render(){
  const q = document.getElementById('search').value.toLowerCase();
  const st = document.getElementById('stateFilter').value;
  const of = document.getElementById('officeFilter').value;
  const en = document.getElementById('endorseFilter').value;

  const filtered = candidates.filter(c => {
    const matchQ = !q || [c.name,c.city,c.county,c.state,c.office].join(' ').toLowerCase().includes(q);
    const matchSt = !st || c.state===st;
    const matchOf = !of || c.office===of;
    const matchEn = !en || (c.endorsements||[]).includes(en);
    return matchQ && matchSt && matchOf && matchEn;
  });

  document.getElementById('count').textContent = `${filtered.length} candidate${filtered.length!==1?'s':''}`;

  const grid = document.getElementById('grid');
  if(!filtered.length){
    grid.innerHTML = '<div class="empty">No candidates match your filters.</div>';
    return;
  }
  grid.innerHTML = filtered.map(c => `
    <div class="card">
      <div class="card-name">${c.name}</div>
      <div class="card-office">${c.office}</div>
      <div class="card-location">📍 ${[c.city,c.county?c.county+' Co.':'',c.state].filter(Boolean).join(', ')}</div>
      <div class="tags">${(c.endorsements||[]).map(e=>`<span class="tag ${tagClass(e)}">${e}</span>`).join('')}</div>
      ${c.website?`<a class="card-link" href="${c.website}" target="_blank">Campaign website →</a>`:''}
      <div class="updated">Updated ${c.last_updated||'unknown'}</div>
    </div>`).join('');
}

function populateFilters(){
  const states = [...new Set(candidates.map(c=>c.state))].sort();
  const offices = [...new Set(candidates.map(c=>c.office))].sort();
  const sf = document.getElementById('stateFilter');
  const of = document.getElementById('officeFilter');
  states.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;sf.appendChild(o);});
  offices.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;of.appendChild(o);});
}

function openModal(){ document.getElementById('modal').classList.add('open'); }
function closeModal(){ document.getElementById('modal').classList.remove('open'); }

function saveCandidate(){
  const name = document.getElementById('f-name').value.trim();
  const office = document.getElementById('f-office').value.trim();
  const state = document.getElementById('f-state').value.trim().toUpperCase();
  if(!name||!office||!state){ alert('Name, office, and state are required.'); return; }
  const endorsements = document.getElementById('f-endorse').value.split(',').map(e=>e.trim()).filter(Boolean);
  const newC = {
    id: Date.now(),
    name, office,
    city: document.getElementById('f-city').value.trim(),
    county: document.getElementById('f-county').value.trim(),
    state,
    endorsements,
    website: document.getElementById('f-site').value.trim(),
    last_updated: new Date().toISOString().slice(0,10)
  };
  candidates.unshift(newC);
  populateFilters();
  render();
  closeModal();
  ['f-name','f-office','f-city','f-county','f-state','f-endorse','f-site'].forEach(id=>document.getElementById(id).value='');
}

fetch('candidates.json')
  .then(r=>r.json())
  .then(data=>{ candidates=data; populateFilters(); render(); })
  .catch(()=>{ document.getElementById('grid').innerHTML='<div class="empty">Could not load candidate data.</div>'; });
</script>
</body>
</html>
